name: SOL Exciton Reproducibility Baseline — Weekly

on:
  schedule:
    # 09:00 UTC every Tuesday — independent of the snowball nightly so a
    # reproducibility regression is detected early in the week.
    - cron: "0 9 * * 2"
  workflow_dispatch: {}

concurrency:
  # Joins the snowball concurrency group: this check spins up an in-process
  # EntangledSOLPair, so it must not race the engine, lesson_compiler, or
  # advisory writer when reading or mutating working_data state.
  group: sol-exciton-snowball-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  repro_baseline_check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Exciton-MoA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Exciton-MoA/requirements.txt

      - name: Run reproducibility baseline check
        id: repro
        working-directory: Exciton-MoA
        run: |
          set -o pipefail
          python scripts/repro_baseline_check.py \
            --cycles 12 \
            --seed 149 \
            --repeats 3 \
            | tee repro_baseline_outcome.json

      - name: Commit baseline artifacts
        if: success() || failure()
        run: |
          git config user.name "sol-exciton-repro[bot]"
          git config user.email "sol-exciton-repro@users.noreply.github.com"
          git add Exciton-MoA/working_data/repro_baseline || true
          if git diff --cached --quiet; then
            echo "No repro baseline artifacts to commit"
            exit 0
          fi
          git commit -m "repro_baseline_check(weekly): run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload baseline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-exciton-repro-baseline-${{ github.run_id }}
          path: |
            Exciton-MoA/working_data/repro_baseline
            Exciton-MoA/repro_baseline_outcome.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        working-directory: Exciton-MoA
        run: |
          echo "## SOL Exciton Reproducibility Baseline — Weekly" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          if [ -f repro_baseline_outcome.json ]; then
            tail -n 1 repro_baseline_outcome.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_output"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "A failing job here is a #2 (deterministic engine) regression." >> "$GITHUB_STEP_SUMMARY"
