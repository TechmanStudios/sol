name: "SOL Self-Train"

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Runtime profile mode"
        required: true
        default: "overnight"
        type: choice
        options:
          - default
          - fast
          - full
          - overnight
      generations:
        description: "Number of generations"
        required: false
        default: "3"
      config:
        description: "Path to self-train config JSON"
        required: false
        default: "tools/sol-evolve/self_train/config/self_train_config.json"
      out_dir:
        description: "Output directory (relative to repo root)"
        required: false
        default: "data/sol_self_train_runs"
      run_source:
        description: "Origin label for this run (used for selective local artifact sync)"
        required: true
        default: "desktop"
        type: choice
        options:
          - phone
          - desktop
          - server

concurrency:
  group: sol-self-train-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  self-train:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run self-train loop
        id: train
        run: |
          echo "Running self-train with mode=${{ github.event.inputs.mode }} generations=${{ github.event.inputs.generations }}"
          python tools/sol-evolve/self_train_run.py \
            --config "${{ github.event.inputs.config }}" \
            --generations "${{ github.event.inputs.generations }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --source "github-actions" \
            --run-id "${{ github.run_id }}" \
            --out-root "${{ github.event.inputs.out_dir }}"
          OUT_DIR="${{ github.event.inputs.out_dir }}/github-actions/${{ github.event.inputs.mode }}/${{ github.run_id }}"
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT

      - name: Update self-train ledger
        run: |
          python tools/sol-evolve/self_train_consolidate.py \
            --root "${{ github.event.inputs.out_dir }}" \
            --out-dir "${{ github.event.inputs.out_dir }}/_ledger"

      - name: Update global experiment ledger
        run: |
          python tools/analysis/experiment_ledger.py \
            --self-train-root "${{ github.event.inputs.out_dir }}" \
            --out-dir "data/experiment_ledger"

      - name: Commit synced run outputs
        run: |
          git config user.name "sol-self-train[bot]"
          git config user.email "sol-self-train@users.noreply.github.com"
          git add "${{ steps.train.outputs.out_dir }}" || true
          git add "${{ github.event.inputs.out_dir }}/_ledger" || true
          git add "data/experiment_ledger" || true
          if git diff --cached --quiet; then
            echo "No run outputs to commit"
            exit 0
          fi
          git commit -m "self-train: mode=${{ github.event.inputs.mode }} run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: self-train-${{ github.event.inputs.mode }}-${{ github.event.inputs.run_source }}-${{ github.run_id }}
          path: |
            ${{ steps.train.outputs.out_dir }}
          retention-days: 30

      - name: Job summary
        run: |
          echo "## SOL Self-Train Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: \`${{ github.event.inputs.mode }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Generations: \`${{ github.event.inputs.generations }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run source: \`${{ github.event.inputs.run_source }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Output: \`${{ steps.train.outputs.out_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: \`self-train-${{ github.event.inputs.mode }}-${{ github.event.inputs.run_source }}-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
