# SOL RSI — Recursive Self-Improvement
#
# Runs the RSI outer loop on a schedule or manual trigger.
# Mode: cron (unattended single cycle)
#
# Three execution contexts:
#   1. GitHub Actions (this workflow) — scheduled cron + manual dispatch
#   2. Local persistent — run on personal machine for N hours
#   3. Server persistent — run on VM/server continuously

name: SOL RSI

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "cron"
        type: choice
        options:
          - cron
          - persistent
      cycles:
        description: "Number of RSI cycles to run"
        required: true
        default: "1"
        type: string
      budget_hours:
        description: "Maximum runtime in hours (0 = unlimited)"
        required: true
        default: "2"
        type: string
      dry_run:
        description: "Dry run (evaluate + plan only)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      budget_dollars:
        description: "Maximum LLM spend in USD (0 = unlimited)"
        required: false
        default: "1.0"
        type: string
      run_source:
        description: "Origin label for this run (used for selective local artifact sync)"
        required: true
        default: "desktop"
        type: choice
        options:
          - phone
          - desktop
          - server

  # Weekly schedule: Sunday 03:00 UTC (before cortex Mon 06:00)
  schedule:
    - cron: "0 3 * * 0"

  # Trigger on sol-rsi labeled issues
  issues:
    types: [labeled]

concurrency:
  group: sol-rsi-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  rsi-cycle:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'issues' &&
       contains(github.event.issue.labels.*.name, 'sol-rsi'))
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy openai

      - name: Verify engine integrity
        run: |
          echo "Checking sol_engine.py SHA256..."
          SHA=$(sha256sum tools/sol-core/sol_engine.py | cut -d' ' -f1)
          EXPECTED="0ad3e8d34b61cc9a96fe8f4a85266f3daa21791f5778686874117b0f626f69f5"
          if [ "$SHA" != "$EXPECTED" ]; then
            echo "::error::Engine SHA256 mismatch! Expected $EXPECTED got $SHA"
            exit 1
          fi
          echo "Engine integrity verified."

          echo "Checking default_graph.json SHA256..."
          SHA=$(sha256sum tools/sol-core/default_graph.json | cut -d' ' -f1)
          EXPECTED="d0a80462d2b9389160502b097aca1932bb014941adf6e4b77799997283e4a1bc"
          if [ "$SHA" != "$EXPECTED" ]; then
            echo "::error::Graph SHA256 mismatch! Expected $EXPECTED got $SHA"
            exit 1
          fi
          echo "Graph integrity verified."

      - name: Run RSI cycle
        env:
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'cron' }}"
          CYCLES="${{ github.event.inputs.cycles || '1' }}"
          BUDGET="${{ github.event.inputs.budget_hours || '2' }}"
          BUDGET_DOLLARS="${{ github.event.inputs.budget_dollars || '1.0' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"

          ARGS="--mode $MODE --cycles $CYCLES --budget-hours $BUDGET --budget-dollars $BUDGET_DOLLARS"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi

          python tools/sol-rsi/rsi_engine.py $ARGS

      - name: Resolve run source
        id: run_source
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ github.event.inputs.run_source || 'desktop' }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=server" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit results
        run: |
          git config user.name "sol-rsi[bot]"
          git config user.email "sol-rsi@techmanstudios.com"
          git add -A data/rsi/ solKnowledge/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "RSI cycle $(date +%Y%m%d-%H%M%S): fitness update"
            # Retry push with rebase to handle concurrent workflow commits
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "Push attempt $attempt failed, rebasing..."
              git pull --rebase
            done
          fi

      - name: Upload RSI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rsi-cycle-${{ steps.run_source.outputs.value }}-${{ github.run_id }}
          path: |
            data/rsi/
          retention-days: 90

      - name: Print status
        run: python tools/sol-rsi/rsi_engine.py --status
