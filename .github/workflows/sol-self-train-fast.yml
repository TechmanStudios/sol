name: "SOL Self-Train Fast Preset"

on:
  workflow_dispatch:
    inputs:
      chain_depth:
        description: "Daytime chain depth"
        required: true
        default: "standard"
        type: choice
        options:
          - quick
          - standard
          - extended
          - ultra-extended
      run_source:
        description: "Origin label for this run (used for selective local artifact sync)"
        required: true
        default: "phone"
        type: choice
        options:
          - phone
          - desktop

concurrency:
  group: sol-self-train-fast-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  self-train-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve chain config
        id: chain
        run: |
          DEPTH="${{ github.event.inputs.chain_depth }}"
          case "$DEPTH" in
            quick)
              GENERATIONS="1"
              ;;
            standard)
              GENERATIONS="3"
              ;;
            extended)
              GENERATIONS="6"
              ;;
            ultra-extended)
              GENERATIONS="10"
              ;;
            *)
              echo "Invalid chain_depth: $DEPTH"
              exit 1
              ;;
          esac
          echo "generations=$GENERATIONS" >> $GITHUB_OUTPUT
          echo "depth=$DEPTH" >> $GITHUB_OUTPUT

      - name: Run fast self-train preset
        id: train
        run: |
          python tools/sol-evolve/self_train_run.py \
            --config "tools/sol-evolve/self_train/config/self_train_config.json" \
            --generations "${{ steps.chain.outputs.generations }}" \
            --mode "fast" \
            --source "github-actions" \
            --run-id "${{ github.run_id }}" \
            --out-root "data/sol_self_train_runs"
          OUT_DIR="data/sol_self_train_runs/github-actions/fast/${{ github.run_id }}"
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT

      - name: Update self-train ledger
        run: |
          python tools/sol-evolve/self_train_consolidate.py \
            --root "data/sol_self_train_runs" \
            --out-dir "data/sol_self_train_runs/_ledger"

      - name: Update global experiment ledger
        run: |
          python tools/analysis/experiment_ledger.py \
            --self-train-root "data/sol_self_train_runs" \
            --out-dir "data/experiment_ledger"

      - name: Commit synced run outputs
        run: |
          git config user.name "sol-self-train[bot]"
          git config user.email "sol-self-train@users.noreply.github.com"
          git add "${{ steps.train.outputs.out_dir }}" || true
          git add "data/sol_self_train_runs/_ledger" || true
          git add "data/experiment_ledger" || true
          if git diff --cached --quiet; then
            echo "No run outputs to commit"
            exit 0
          fi
          git commit -m "self-train: mode=fast depth=${{ steps.chain.outputs.depth }} run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: self-train-fast-${{ github.event.inputs.run_source }}-${{ github.run_id }}
          path: |
            ${{ steps.train.outputs.out_dir }}
          retention-days: 30

      - name: Job summary
        run: |
          echo "## SOL Self-Train Fast Preset Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: \`fast\`" >> $GITHUB_STEP_SUMMARY
          echo "- Chain depth: \`${{ steps.chain.outputs.depth }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Generations: \`${{ steps.chain.outputs.generations }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run source: \`${{ github.event.inputs.run_source }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Output: \`${{ steps.train.outputs.out_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: \`self-train-fast-${{ github.event.inputs.run_source }}-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
