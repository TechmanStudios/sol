name: "SOL Self-Train Overnight Preset"

on:
  workflow_dispatch:

concurrency:
  group: sol-self-train-overnight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  self-train-overnight:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run overnight self-train preset
        id: train
        run: |
          python tools/sol-evolve/self_train_run.py \
            --config "tools/sol-evolve/self_train/config/self_train_config.json" \
            --generations "3" \
            --mode "overnight" \
            --source "github-actions" \
            --run-id "${{ github.run_id }}" \
            --out-root "data/sol_self_train_runs"
          OUT_DIR="data/sol_self_train_runs/github-actions/overnight/${{ github.run_id }}"
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT

      - name: Update self-train ledger
        run: |
          python tools/sol-evolve/self_train_consolidate.py \
            --root "data/sol_self_train_runs" \
            --out-dir "data/sol_self_train_runs/_ledger"

      - name: Update global experiment ledger
        run: |
          python tools/analysis/experiment_ledger.py \
            --self-train-root "data/sol_self_train_runs" \
            --out-dir "data/experiment_ledger"

      - name: Commit synced run outputs
        run: |
          git config user.name "sol-self-train[bot]"
          git config user.email "sol-self-train@users.noreply.github.com"
          git add "${{ steps.train.outputs.out_dir }}" || true
          git add "data/sol_self_train_runs/_ledger" || true
          git add "data/experiment_ledger" || true
          if git diff --cached --quiet; then
            echo "No run outputs to commit"
            exit 0
          fi
          git commit -m "self-train: mode=overnight run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: self-train-overnight-phone-${{ github.run_id }}
          path: |
            ${{ steps.train.outputs.out_dir }}
          retention-days: 30

      - name: Job summary
        run: |
          echo "## SOL Self-Train Overnight Preset Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Mode: \`overnight\`" >> $GITHUB_STEP_SUMMARY
          echo "- Generations: \`3\`" >> $GITHUB_STEP_SUMMARY
          echo "- Run source: \`phone\`" >> $GITHUB_STEP_SUMMARY
          echo "- Output: \`${{ steps.train.outputs.out_dir }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: \`self-train-overnight-phone-${{ github.run_id }}\`" >> $GITHUB_STEP_SUMMARY
