name: SOL Exciton Lesson Advisory Writer — Weekly

on:
  schedule:
    # 11:00 UTC every Monday — runs after the lesson_compiler workflow
    # (10:00 UTC) so the freshest cross-pocket lessons feed the advisory
    # clamp on the same day.
    - cron: "0 11 * * 1"
  workflow_dispatch: {}

concurrency:
  # Joins the snowball concurrency group so the advisory writer never
  # races the engine, lesson_compiler, or other consumers when reading or
  # mutating working_data state.
  group: sol-exciton-snowball-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  lesson_advisory_writer:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Exciton-MoA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Exciton-MoA/requirements.txt

      - name: Run lesson advisory writer
        working-directory: Exciton-MoA
        run: |
          python scripts/lesson_advisory_writer.py \
            --min-corroboration 3 \
            | tee lesson_advisory_outcome.json

      - name: Commit advisory writer artifacts and state
        run: |
          git config user.name "sol-exciton-lesson[bot]"
          git config user.email "sol-exciton-lesson@users.noreply.github.com"
          git add \
            Exciton-MoA/working_data/snowball/consumers/lesson_advisory_writer \
            Exciton-MoA/working_data/snowball/state.json \
            || true
          if git diff --cached --quiet; then
            echo "No advisory writer artifacts to commit"
            exit 0
          fi
          git commit -m "lesson_advisory_writer(weekly): run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload advisory writer artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-exciton-lesson-advisory-${{ github.run_id }}
          path: |
            Exciton-MoA/working_data/snowball/consumers/lesson_advisory_writer
            Exciton-MoA/lesson_advisory_outcome.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        working-directory: Exciton-MoA
        run: |
          echo "## SOL Exciton Lesson Advisory Writer — Weekly" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          if [ -f lesson_advisory_outcome.json ]; then
            cat lesson_advisory_outcome.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_output"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
