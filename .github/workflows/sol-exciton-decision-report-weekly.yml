name: SOL Exciton Decision Report — Weekly

on:
  schedule:
    # 09:00 UTC every Wednesday — runs after the lesson_compiler (Mon 10:00),
    # advisory writer (Mon 11:00), and any mid-week arm_promotion runs so the
    # weekly snapshot reflects everything they've decided.
    - cron: "0 9 * * 3"
  workflow_dispatch: {}

concurrency:
  # Joins the snowball concurrency group so the report never reads partial
  # state mid-write from the engine or another consumer.
  group: sol-exciton-snowball-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  decision_report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: Exciton-MoA/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Exciton-MoA/requirements.txt

      - name: Run snowball decision report
        working-directory: Exciton-MoA
        run: |
          python scripts/snowball_decision_report.py \
            --ledger-tail 60 \
            | tee snowball_decision_report_outcome.json

      - name: Commit decision report artifacts
        run: |
          git config user.name "sol-exciton-report[bot]"
          git config user.email "sol-exciton-report@users.noreply.github.com"
          git add \
            Exciton-MoA/working_data/snowball/consumers/snowball_decision_report \
            || true
          if git diff --cached --quiet; then
            echo "No decision report artifacts to commit"
            exit 0
          fi
          git commit -m "snowball_decision_report(weekly): run=${{ github.run_id }}"
          for attempt in 1 2 3; do
            if git push; then break; fi
            echo "Push attempt $attempt failed, rebasing..."
            git pull --rebase
          done

      - name: Upload decision report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-exciton-decision-report-${{ github.run_id }}
          path: |
            Exciton-MoA/working_data/snowball/consumers/snowball_decision_report
            Exciton-MoA/snowball_decision_report_outcome.json
          retention-days: 30
          if-no-files-found: warn

      - name: Job summary
        if: always()
        working-directory: Exciton-MoA
        run: |
          echo "## SOL Exciton Decision Report — Weekly" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          if [ -f snowball_decision_report_outcome.json ]; then
            cat snowball_decision_report_outcome.json >> "$GITHUB_STEP_SUMMARY"
          else
            echo '{"status":"no_output"}' >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
